<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>AFE Sistema</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter&display=swap');

body{
margin:0;
font-family:'Inter';
background:radial-gradient(circle at top,#5a0000,#0d0000);
color:#eee;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(212,175,55,0.3);
}

.logo{
font-family:'Cinzel';
font-size:26px;
color:#d4af37;
letter-spacing:2px;
}

/* LOGIN */
.center{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:rgba(0,0,0,0.8);
padding:40px;
border-radius:20px;
box-shadow:0 0 40px rgba(0,0,0,0.8);
text-align:center;
width:320px;
}

input,textarea,select{
width:100%;
padding:10px;
margin:6px 0;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.05);
color:white;
outline:none;
}

input:focus,textarea:focus{
box-shadow:0 0 10px rgba(212,175,55,0.4);
}

button{
padding:10px;
width:100%;
background:#d4af37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* LAYOUT */
.container{
padding:20px;
max-width:1400px;
margin:auto;
}

.tabs{
display:flex;
gap:10px;
margin-bottom:15px;
}

.tab{
padding:10px 20px;
background:rgba(255,255,255,0.05);
cursor:pointer;
border-radius:10px;
transition:0.2s;
}

.tab.active{
background:#d4af37;
color:black;
}

.card{
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
padding:20px;
border-radius:15px;
margin-bottom:15px;
box-shadow:0 0 20px rgba(0,0,0,0.6);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
gap:12px;
}

/* PERICIAS */
.pericia{
display:flex;
justify-content:space-between;
align-items:center;
padding:5px 10px;
background:rgba(255,255,255,0.03);
border-radius:8px;
font-size:14px;
}

/* GRAFICO */
canvas{
display:block;
margin:20px auto;
width:420px;
height:420px;
}

/* EVENTOS */
.event{
border-left:4px solid #d4af37;
padding-left:10px;
margin-bottom:10px;
}

/* FOCO (VIDA) */
.foco-bar{
width:100%;
height:25px;
background:rgba(255,255,255,0.1);
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.foco-fill{
height:100%;
background:linear-gradient(90deg,#d4af37,#ffd700);
width:50%;
transition:width 0.3s ease;
}

/* ANIMAÇÃO */
.fade{
animation:fadeIn 0.4s ease;
}
@keyframes fadeIn{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

/* ===== PATCH VISUAL AFE ===== */

/* TÍTULOS MAIS FORTE */
h3{
font-family:'Cinzel';
color:#d4af37;
letter-spacing:1px;
margin-bottom:10px;
}

/* CARDS MAIS VIVOS */
.card{
border:1px solid rgba(212,175,55,0.15);
transition:0.2s;
}
.card:hover{
transform:scale(1.01);
box-shadow:0 0 25px rgba(212,175,55,0.2);
}

/* INPUTS ESTILO FICHA */
input,textarea,select{
background:transparent;
border-bottom:1px solid rgba(212,175,55,0.3);
border-radius:0;
}

/* PLACEHOLDER */
::placeholder{
color:rgba(255,255,255,0.3);
}

/* SCROLL BONITO */
::-webkit-scrollbar{
width:6px;
}
::-webkit-scrollbar-thumb{
background:#d4af37;
border-radius:10px;
}

/* FOCO CRÍTICO */
.foco-fill.low{
background:linear-gradient(90deg,#8b0000,#ff0000);
}

/* TABS MAIS BONITAS */
.tab{
border:1px solid transparent;
}
.tab:hover{
border:1px solid rgba(212,175,55,0.3);
}

/* HEADER MAIS IMPACTANTE */
.header{
box-shadow:0 0 20px rgba(212,175,55,0.1);
}

/* LOGO ESTILIZADA */
.logo::before{
content:"◈ ";
color:#d4af37;
}

/* HUD FIXO */
.hud{
position:fixed;
top:0;
right:0;
background:rgba(0,0,0,0.7);
padding:10px 20px;
border-left:2px solid #d4af37;
border-bottom:2px solid #d4af37;
border-radius:0 0 0 15px;
font-size:13px;
z-index:999;
}

/* INPUT FOCO BRILHO */
input:focus, textarea:focus{
box-shadow:0 0 12px rgba(212,175,55,0.6);
}
</style>
</head>

<body>

<audio id="bgAudio" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9bde5d.mp3" type="audio/mp3">
</audio>

<div id="loginScreen" class="center">
<div class="login-box">
<h1 style="font-family:Cinzel;color:#d4af37;">AFE</h1>
<input id="user" placeholder="Login">
<input id="pass" placeholder="Senha">
<button onclick="login()">Entrar</button>
</div>
</div>

<div id="app" style="display:none">

<div class="header">
<div class="logo">Academia Federal Éden</div>
<div id="welcome"></div>
</div>

<div class="container">

<select id="userSelect" onchange="loadUser()" style="display:none"></select>

<div class="tabs">
<div class="tab active" onclick="openTab('status')">Status</div>
<div class="tab" onclick="openTab('academico')">Acadêmico</div>
<div class="tab" onclick="openTab('social')">Social</div>
<div class="tab" onclick="openTab('eventos')">Eventos</div>
</div>

<div id="status" class="tabContent fade">

<div class="card">
Nome <input id="nome">
Idade <input id="idade">
Sala <input id="sala">
Matrícula: <b id="matricula"></b>

<h3>Foco</h3>
Atual <input id="focoAtual" type="number">
Máximo <input id="focoMax" type="number">

<div class="foco-bar">
<div class="foco-fill" id="focoFill"></div>
</div>

</div>

<div class="card">
<h3>Atributos</h3>

<div class="grid">
Coordenação <input id="coord">
Físico <input id="fisico">
Influência <input id="infl">
Intelecto <input id="inte">
Percepção <input id="perc">
</div>

<canvas id="grafico" width="500" height="500"></canvas>
</div>

</div>

<div id="academico" class="tabContent" style="display:none">
<div class="card">
Matérias <textarea id="materias"></textarea>
Admissão <select id="adm">
<option>Carta de Recomendação</option>
<option>Destaque Acadêmico</option>
<option>Destaque Cultural</option>
<option>Destaque Esportivo</option>
</select>
</div>

<div class="card">
<h3>Perícias</h3>
<div id="pericias" class="grid"></div>
</div>
</div>

<div id="social" class="tabContent" style="display:none">
<div class="card">
Pontos <input id="pontos">
Inventário <textarea id="inv"></textarea>
</div>
</div>

<div id="eventos" class="tabContent" style="display:none">
<div id="eventoForm" style="display:none">
<input id="eventoTitulo" placeholder="Título">
<textarea id="eventoDesc"></textarea>
<button onclick="addEvento()">Criar Evento</button>
</div>
<div id="listaEventos"></div>
</div>

</div>
</div>

<script>

const users={
diretoria:{pass:"eden123",matricula:"0001"},
henrique:{pass:"123",matricula:"1001"},
gabriel:{pass:"123",matricula:"1002"},
gustavo:{pass:"123",matricula:"1003"},
ian:{pass:"123",matricula:"1004"}
};

let currentUser, viewingUser;

const periciasList=["Artes Marciais","Ciências Humanas","Ciências Naturais","Destreza","Diplomacia","Enganação","Esportiva","Força","Intimidação","Linguagem","Língua Estrangeira","Literatura","Lógica","Matemática","Observação","Performance","Tecnologia","Vigor"];

function login(){
if(users[user.value]&&users[user.value].pass===pass.value){

bgAudio.play();

currentUser=user.value;
viewingUser=user.value;

loginScreen.style.display="none";
app.style.display="block";

welcome.innerText=currentUser;

if(currentUser==="diretoria"){
userSelect.style.display="block";
eventoForm.style.display="block";
for(let k in users){
let o=document.createElement("option");
o.value=k;
o.text=k;
userSelect.appendChild(o);
}
}

initPericias();
loadUser();
loadEventos();
}
}

function openTab(id){
document.querySelectorAll(".tabContent").forEach(t=>t.style.display="none");
document.getElementById(id).style.display="block";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
}

function initPericias(){
pericias.innerHTML="";
periciasList.forEach(p=>{
let d=document.createElement("div");
d.className="pericia";
d.innerHTML="<span>"+p+"</span><input id='p_"+p+"' type='number' min='0' max='3'>";
pericias.appendChild(d);
});
}

function updateFoco(){
let atual=+focoAtual.value||0;
let max=+focoMax.value||1;

let percent=(atual/max)*100;
focoFill.style.width=Math.min(percent,100)+"%";
}

function save(){
let data={
nome:nome.value,
idade:idade.value,
sala:sala.value,
coord:+coord.value||0,
fisico:+fisico.value||0,
infl:+infl.value||0,
inte:+inte.value||0,
perc:+perc.value||0,
focoAtual:+focoAtual.value||0,
focoMax:+focoMax.value||0,
materias:materias.value,
adm:adm.value,
pontos:pontos.value,
inv:inv.value,
pericias:{}
};

periciasList.forEach(p=>{
data.pericias[p]=document.getElementById("p_"+p).value;
});

localStorage.setItem("afe_"+viewingUser,JSON.stringify(data));
animateGraph();
updateFoco();
}

function loadUser(){
viewingUser=currentUser==="diretoria"?userSelect.value:currentUser;

matricula.innerText=users[viewingUser].matricula;

let d=JSON.parse(localStorage.getItem("afe_"+viewingUser)||"{}");

nome.value=d.nome||"";
idade.value=d.idade||"";
sala.value=d.sala||"";

coord.value=d.coord||0;
fisico.value=d.fisico||0;
infl.value=d.infl||0;
inte.value=d.inte||0;
perc.value=d.perc||0;

focoAtual.value=d.focoAtual||0;
focoMax.value=d.focoMax||10;

materias.value=d.materias||"";
adm.value=d.adm||"Carta de Recomendação";
pontos.value=d.pontos||"";
inv.value=d.inv||"";

periciasList.forEach(p=>{
document.getElementById("p_"+p).value=(d.pericias||{})[p]||0;
});

animateGraph();
updateFoco();
}

document.addEventListener("input",save);

function animateGraph(){
let ctx=grafico.getContext("2d");
let vals=[coord.value,fisico.value,infl.value,inte.value,perc.value];

let progress=0;

function draw(){
ctx.clearRect(0,0,500,500);

ctx.beginPath();

for(let i=0;i<5;i++){
let ang=(Math.PI*2/5)*i - Math.PI/2;
let r=(vals[i]*20)*progress;
let x=250+Math.cos(ang)*r;
let y=250+Math.sin(ang)*r;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}

ctx.closePath();
ctx.fillStyle="rgba(212,175,55,0.7)";
ctx.fill();

progress+=0.05;
if(progress<=1) requestAnimationFrame(draw);
}

draw();
}

/* EVENTOS */
function addEvento(){
let eventos=JSON.parse(localStorage.getItem("eventos")||"[]");

eventos.push({titulo:eventoTitulo.value,desc:eventoDesc.value});

localStorage.setItem("eventos",JSON.stringify(eventos));
loadEventos();
}

function loadEventos(){
let eventos=JSON.parse(localStorage.getItem("eventos")||"[]");
listaEventos.innerHTML="";

eventos.forEach(e=>{
let div=document.createElement("div");
div.className="event fade";
div.innerHTML="<b>"+e.titulo+"</b><br>"+e.desc;
listaEventos.appendChild(div);
});
}

/* ===== PATCH AFE ESTÁVEL ===== */

let hudCreated = false;
let clickSound;

/* HUD */
function createHUD(){
if(hudCreated) return;

const hud = document.createElement("div");
hud.className="hud";
hud.id="afeHUD";
document.body.appendChild(hud);

hudCreated = true;
}

function updateHUD(){
const hud = document.getElementById("afeHUD");
if(!hud || !currentUser) return;

hud.innerHTML = `
<b>${viewingUser}</b><br>
Foco: ${focoAtual.value || 0}/${focoMax.value || 0}<br>
Pontos: ${pontos.value || 0}
`;
}

/* FOCO */
function checkFoco(){
let atual = +focoAtual.value || 0;
let max = +focoMax.value || 1;

if(atual/max < 0.3){
focoFill.classList.add("low");
}else{
focoFill.classList.remove("low");
}
}

/* SOM (carrega uma vez só) */
function initSound(){
if(clickSound) return;
clickSound = new Audio("https://cdn.pixabay.com/download/audio/2022/03/10/audio_c1c9b3.mp3?filename=click-124467.mp3");
}

document.addEventListener("click", function(e){
if(!clickSound) return;

if(e.target.tagName==="BUTTON" || e.target.classList.contains("tab")){
clickSound.currentTime = 0;
clickSound.play();
}
});

/* DIRETORIA VISUAL */
function applyRoleStyle(){
if(currentUser==="diretoria"){
document.body.style.boxShadow="inset 0 0 120px rgba(212,175,55,0.15)";
}else{
document.body.style.boxShadow="";
}
}

/* GRAFICO MELHORADO (SEM SUBSTITUIR O ORIGINAL) */
function drawGraphOverlay(){
let ctx = grafico.getContext("2d");

ctx.strokeStyle="rgba(212,175,55,0.2)";
ctx.lineWidth=1;

for(let r=40;r<=200;r+=40){
ctx.beginPath();
ctx.arc(250,250,r,0,Math.PI*2);
ctx.stroke();
}
}

/* HOOK SEGURO */
document.addEventListener("input", function(){
updateHUD();
checkFoco();
});

/* INTEGRAÇÃO COM LOGIN */
const originalLogin = login;
login = function(){
originalLogin();

createHUD();
updateHUD();
checkFoco();
applyRoleStyle();
initSound();

setTimeout(drawGraphOverlay, 200);
};

/* INTEGRAÇÃO COM LOADUSER */
const originalLoadUser = loadUser;
loadUser = function(){
originalLoadUser();

updateHUD();
checkFoco();
applyRoleStyle();

setTimeout(drawGraphOverlay, 200);
};

/* =========================
PATCH INVENTÁRIO + SOCIAL REWORK
========================= */

/* ===== REMOVER INVENTÁRIO ANTIGO ===== */
function removeInventarioAntigo(){
let socialCard = document.querySelector("#social .card textarea#inv");
if(socialCard){
socialCard.parentNode.remove(); // remove o card inteiro antigo
}
}

/* ===== CRIAR NOVA ABA INVENTÁRIO ===== */
function criarAbaInventario(){
if(document.getElementById("abaInventario")) return;

let tab = document.createElement("div");
tab.className="tab";
tab.innerText="Inventário";
tab.onclick=()=>openTab("inventario");

document.querySelector(".tabs").appendChild(tab);

let content = document.createElement("div");
content.id="inventario";
content.className="tabContent";
content.style.display="none";

content.innerHTML=`
<div class="card">
<h3>Inventário Ativo</h3>

<div id="invLista"></div>

<button onclick="addItem()">+ Item</button>

<div style="margin-top:10px">
Carga atual: <span id="cargaAtual">0</span>
</div>
</div>

<h3>Armário</h3>
<div id="armarioLista"></div>
<button onclick="addArmario()">+ Guardar Item</button>
</div>
`;

/* ===== ITEM ===== */
function addItem(nome="",peso=""){
let div = document.createElement("div");
div.style.display="flex";
div.style.gap="5px";
div.style.marginBottom="5px";

div.innerHTML=`
<input type="number" value="${peso}" placeholder="Kg" style="width:60px">
<input value="${nome}" placeholder="Item" style="flex:1">
<button class="miniX" onclick="this.parentNode.remove();updateCarga()">x</button>
`;

invLista.appendChild(div);
updateCarga();
}

/* ===== ARMÁRIO ===== */
function addArmario(nome=""){
let div = document.createElement("div");
div.style.display="flex";
div.style.gap="5px";
div.style.marginBottom="5px";

div.innerHTML=`
<input value="${nome}" placeholder="Item guardado" style="flex:1">
<button class="miniX" onclick="this.parentNode.remove()">x</button>
`;

armarioLista.appendChild(div);
}

/* ===== CARGA ===== */
function updateCarga(){
let total = 0;

document.querySelectorAll("#invLista input[type='number']").forEach(i=>{
total += (+i.value || 0);
});

let max = +cargaMax.value || 5;

cargaAtual.innerText = total + " / " + max;

if(total > max){
cargaAtual.style.color="red";
}else{
cargaAtual.style.color="#d4af37";
}
}

/* ===== CONTATOS ===== */
function criarSistemaContatos(){
if(document.getElementById("contatos")) return;

let div = document.createElement("div");
div.className="card";
div.innerHTML=`
<h3>Contatos</h3>

<div id="contatos"></div>

<button onclick="addContato()">+ Contato</button>
`;

document.getElementById("social").appendChild(div);
}

function addContato(nome="",numero=""){
let div = document.createElement("div");
div.style.display="flex";
div.style.gap="5px";
div.style.marginBottom="5px";

div.innerHTML=`
<input value="${nome}" placeholder="Nome">
<input value="${numero}" placeholder="Número">
<button onclick="toggleBlock(this)">🚫</button>
<button class="miniX" onclick="this.parentNode.remove()">x</button>
`;

contatos.appendChild(div);
}

function toggleBlock(btn){
btn.classList.toggle("bloqueado");

if(btn.classList.contains("bloqueado")){
btn.style.background="red";
}else{
btn.style.background="";
}
}

/* ===== CSS DO X PEQUENO ===== */
const style = document.createElement("style");
style.innerHTML=`
.miniX{
font-size:10px;
padding:2px 6px;
width:auto;
}
`;
document.head.appendChild(style);

/* ===== HOOK FINAL ===== */
const oldLoadUserInv = loadUser;
loadUser = function(){
oldLoadUserInv();

setTimeout(()=>{
removeInventarioAntigo();
criarAbaInventario();
criarSistemaContatos();
updateCarga();
},100);
};

/* ===== ATUALIZA CARGA EM TEMPO REAL ===== */
document.addEventListener("input", e=>{
if(e.target.closest("#invLista")){
updateCarga();
}
});

AFE PATCH 2.0 - SISTEMA AVANÇADO
========================================= */

container.innerHTML=`
<h3>Matérias Inscritas</h3>

/* ========= GRAFICO ESTILIZADO ========= */
function melhorarGrafico(){

let ctx = grafico.getContext("2d");

ctx.clearRect(0,0,500,500);

/* grade */
for(let r=20;r<=100;r+=20){
ctx.beginPath();
ctx.strokeStyle="rgba(212,175,55,0.15)";
ctx.arc(250,250,r,0,Math.PI*2);
ctx.stroke();
}

/* limite 5 */
ctx.beginPath();
ctx.strokeStyle="gold";
ctx.lineWidth=2;

for(let i=0;i<5;i++){
let ang=(Math.PI*2/5)*i - Math.PI/2;
let x=250+Math.cos(ang)*100;
let y=250+Math.sin(ang)*100;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}
ctx.closePath();
ctx.stroke();
}

/* ========= EVENTOS ========= */
function melhorarEventos(){

const oldLoadEventos = loadEventos;

loadEventos = function(){
oldLoadEventos();

document.querySelectorAll(".event").forEach((e,i)=>{

/* marcar como lido */
let btn=document.createElement("button");
btn.innerText="Lido";
btn.style.fontSize="10px";

/* =========================================
GRÁFICO - ANIMAÇÃO CORRIGIDA
========================================= */

let graphAnimFrame;

function animateGraphSmooth(){

cancelAnimationFrame(graphAnimFrame);

let ctx = grafico.getContext("2d");

let vals = [
+coord.value||1,
+fisico.value||1,
+infl.value||1,
+inte.value||1,
+perc.value||1
];

let target = vals.map(v=>Math.max(1,Math.min(v,6)));
let current = [0,0,0,0,0];

function draw(){

ctx.clearRect(0,0,500,500);

/* grid */
for(let r=40;r<=200;r+=40){
ctx.beginPath();
ctx.strokeStyle="rgba(212,175,55,0.15)";
ctx.arc(250,250,r,0,Math.PI*2);
ctx.stroke();
}

/* animação */
let done = true;

ctx.beginPath();

for(let i=0;i<5;i++){

current[i] += (target[i]-current[i])*0.15;

if(Math.abs(current[i]-target[i])>0.01) done=false;

let ang=(Math.PI*2/5)*i - Math.PI/2;
let r=current[i]*35;

let x=250+Math.cos(ang)*r;
let y=250+Math.sin(ang)*r;

if(i===0) ctx.moveTo(x,y);
else ctx.lineTo(x,y);
}

ctx.closePath();
ctx.fillStyle="rgba(212,175,55,0.6)";
ctx.fill();

if(!done){
graphAnimFrame = requestAnimationFrame(draw);
}

}

draw();
}

/* =========================================
FOCO - ANIMAÇÃO SUAVE
========================================= */

function animateFoco(){

let atual = +focoAtual.value||0;
let max = +focoMax.value||1;

let percent = Math.min((atual/max)*100,100);

focoFill.style.transition="width 0.4s ease";
focoFill.style.width = percent+"%";

if(percent<30){
focoFill.classList.add("low");
}else{
focoFill.classList.remove("low");
}

}

contatosBloqueados.appendChild(div);
btnBlock.innerText="Desbloquear";
}else{
div.style.opacity="1";
contatosLista.appendChild(div);
btnBlock.innerText="Bloquear";
}
};

contatosLista.appendChild(div);
};

}

/* =========================================
INVENTÁRIO REWORK TOTAL
========================================= */
function patchInventarioNovo(){

/* remove aba antiga se existir */
let old = document.getElementById("inventario");
if(old) old.remove();

/* remove tab antiga */
document.querySelectorAll(".tab").forEach(t=>{
if(t.innerText==="Inventário") t.remove();
});

/* cria nova tab */
let tab = document.createElement("div");
tab.className="tab";
tab.innerText="Inventário";
tab.onclick=()=>openTab("inventarioNovo");

document.querySelector(".tabs").appendChild(tab);

/* cria conteúdo */
let div = document.createElement("div");
div.id="inventarioNovo";
div.className="tabContent";
div.style.display="none";

div.innerHTML=`
<div class="card">
<h3>Inventário Ativo</h3>

Carga Máxima <input id="cargaMaxNova" type="number" value="5">

<div id="listaInvNovo"></div>

<button onclick="addItemNovo()">+ Item</button>

<div style="margin-top:10px">
Carga: <span id="pesoAtualNovo">0 / 5</span>
</div>
</div>

<div class="card">
<h3>Armário</h3>

<div id="listaArmarioNovo"></div>
</div>
`;

document.querySelector(".container").appendChild(div);

/* funções */
window.addItemNovo = function(nome="",peso=""){

let item = document.createElement("div");
item.style.display="flex";
item.style.gap="5px";
item.style.marginBottom="5px";

item.innerHTML=`
<input type="number" value="${peso}" placeholder="Kg" style="width:60px">
<input value="${nome}" placeholder="Item" style="flex:1">
<button class="miniBtn">⇅</button>
<button class="miniBtn">x</button>
`;

let btnMove = item.children[2];
let btnDel = item.children[3];

btnDel.onclick=()=>{
item.remove();
updatePesoNovo();
};

btnMove.onclick=()=>{
listaArmarioNovo.appendChild(item);
updatePesoNovo();
};

listaInvNovo.appendChild(item);
updatePesoNovo();
};

function updatePesoNovo(){

let total=0;

document.querySelectorAll("#listaInvNovo input[type='number']").forEach(i=>{
total += (+i.value||0);
});

let max = +cargaMaxNova.value||5;

pesoAtualNovo.innerText = total+" / "+max;

pesoAtualNovo.style.color = total>max ? "red" : "#d4af37";
}

/* armário interação */
listaArmarioNovo.addEventListener("click", e=>{
if(e.target.classList.contains("miniBtn")){

let item = e.target.parentNode;

/* voltar pro inventário */
listaInvNovo.appendChild(item);
updatePesoNovo();

}
});

/* atualizar peso */
document.addEventListener("input", e=>{
if(e.target.closest("#listaInvNovo")){
updatePesoNovo();
}
});

}

/* =========================================
HOOK FINAL SEGURO
========================================= */
const oldLoadUserREWORK = loadUser;

loadUser = function(){
oldLoadUserREWORK();

setTimeout(()=>{
removeEventosTotal();
patchStatusPontos();
patchSocialNovo();
patchInventarioNovo();
},120);
};

/* =========================================
FIX CONTATOS - REMOVE BOTÃO DUPLICADO
========================================= */

function fixDuplicacaoContatos(){

document.querySelectorAll(".contatoItem").forEach(contato=>{

let botoes = contato.querySelectorAll("button");

/* mantém só os dois primeiros (bloquear + excluir) */
if(botoes.length > 2){

botoes.forEach((btn, index)=>{
if(index > 1){
btn.remove();
}
});

}

/* garante que só existe 1 botão de excluir */
let deletes = [...contato.querySelectorAll("button")]
.filter(b=>b.innerText==="x");

if(deletes.length > 1){
deletes.forEach((b,i)=>{
if(i>0) b.remove();
});
}

});

}

/* roda sempre que algo muda */
document.addEventListener("input", ()=>{
setTimeout(fixDuplicacaoContatos, 50);
});

/* roda ao carregar */
const oldLoadUser_FIXCONTATO = loadUser;

loadUser = function(){
oldLoadUser_FIXCONTATO();

setTimeout(()=>{
fixDuplicacaoContatos();
},150);
};
</script>
